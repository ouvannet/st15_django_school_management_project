{% extends 'base.html' %}

{% block title %}Student{% endblock %}

{% block content %}

<h2>Student</h2>

<!DOCTYPE html>
<html>
<head>
    <title>Student Management</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div class="p-3 d-flex justify-content-end">
    <button onclick="openAddStudentModal()" type="button" class="btn btn-primary">
        Add
    </button>
</div>
<table id="studentTable" class="table-secondary">
    <thead>
        <tr>
            <th>ID</th>
            <th>Student Name</th>
            <th>Gender</th>
            <th>DOB</th>
            <th>Salary</th>
            <th>Photo</th>
            <th>Action</th>
        </tr>
    </thead>
</table>

<div class="modal fade" id="studentModal" tabindex="-1" aria-labelledby="studentModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="studentModalLabel">Student Information</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="contactForm">
                    <div class="mb-3 hidden">
                        <input type="text" id="student_id" class="form-control" placeholder="Student ID" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="first_nameInput" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="first_nameInput" placeholder="Enter first name" required>
                    </div>
                    <div class="mb-3">
                        <label for="last_nameInput" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="last_nameInput" placeholder="Enter last name" required>
                    </div>
                    <div class="mb-3">
                        <label for="genderInput" class="form-label">Gender</label>
                        <select class="form-select" id="genderInput" style="color: black;" required>
                            <option value="M" selected>Male</option> 
                            <option value="F">Female</option>
                            <option value="O">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="date_of_birthInput" class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="date_of_birthInput" placeholder="Enter date of birth" required>
                    </div>
                    <div class="mb-3">
                        <label for="salaryInput" class="form-label">Salary</label>
                        <input type="text" class="form-control" id="salaryInput" placeholder="Enter salary" required>
                    </div>
                    <div class="mb-3">
                        <label for="photoInput" class="form-label">Photo</label>
                        <input type="file" class="form-control" id="photoInput" placeholder="Enter photo" required>
                    </div>
                    <button onclick="submitAddEditStudent()" type="button" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
<script>
let table;
$(document).ready(function() {
   table=$('#studentTable').DataTable({
        serverSide: true,  // Enable server-side processing
        processing: true,  // Show processing indicator
        ajax: {
            url: '/student/list',
            type: 'GET',
            dataSrc: 'data',  // Match backend's 'data' key
            error: function(xhr, error, thrown) {
                console.error('DataTables AJAX error:', error, thrown);
                console.log('Response:', xhr.responseText);
            }
        },
        columns: [
            { data: 'id' },
            { 
                data: 'first_name',
                render: function(data, type, row) {
                    return `${data} ${row.last_name}`;
                }
            },
            { 
                data: 'gender',
                render: function(data, type, row) {
                    if (data === 'M') {
                        return 'Male';
                    } else if (data === 'F') {
                        return 'Female';
                    } else {
                        return 'Other';
                    }
                }
            },
            { data: 'date_of_birth' },
            { 
                data: 'salary',
                render: function(data, type, row) {
                    return `$ ${data}`;
                }
            },
            {
                data: 'photo',
                render: function(data, type, row) {
                    if (data) {
                        return `<img src="${data}" alt="Photo" width="50" height="50" style="object-fit: cover; border-radius: 5px;">`;
                    } else {
                        return 'No Photo';
                    }
                }
            },
            {
                data: null,
                render: function(data, type, row) {
                    return `
                        <button onclick='openEditStudent(${JSON.stringify(row)})' class="btn btn-primary">Edit</button>
                        <button onclick="deleteStudent(${row.id})" class="btn btn-primary">Delete</button>
                    `;
                }
            }
        ]
    });
});

function openAddStudentModal() {
    $('#student_id').val('');
    $('#student_nameInput').val('');
    $('#studentModalLabel').text('Add Student');
    $('#studentModal').modal('show');
}
function submitAddEditStudent() {
    let id = $('#student_id').val();
    let url = id ? `/student/edit` : '/student/add';
    let method = 'POST';
    
    const formData = new FormData();
    formData.append('first_name', $('#first_nameInput').val());
    formData.append('last_name', $('#last_nameInput').val());
    formData.append('gender', $('#genderInput').val());
    formData.append('date_of_birth', $('#date_of_birthInput').val());
    formData.append('salary', $('#salaryInput').val());
    formData.append('photo', $('#photoInput')[0].files[0]);
    formData.append('id', (id ? parseInt(id) : undefined));
    $.ajax({
        url: url,
        method: method,
        contentType: 'application/json',
        data: formData,
        processData: false,
        contentType: false,
        success: function () {
            $('#studentModal').modal('hide');
            table.ajax.reload();
        }
    });
}

function openEditStudent(data) {
    console.log(data);
    $('#student_id').val(data.id);
    $('#first_nameInput').val(data.first_name);
    $('#last_nameInput').val(data.last_name);
    $('#genderInput').val(data.gender);
    $('#date_of_birthInput').val(data.date_of_birth);
    $('#salaryInput').val(data.salary);
    $('#studentModal').modal('show');
    $('#studentModalLabel').text('Edit Student');
}

function deleteStudent(id) {
    $.ajax({
        url: `/student/delete`,
        method: 'DELETE',
        contentType: 'application/json',
        data: JSON.stringify({
            id: id,
        }),
        success: function () {
            table.ajax.reload();
        }
    });
}
</script>

</body>
</html>

{% endblock %}
