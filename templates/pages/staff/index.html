{% extends 'base.html' %}

{% block title %}Staff{% endblock %}

{% block content %}

<h2>Staff</h2>

<!DOCTYPE html>
<html>
<head>
    <title>Staff Management</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div class="p-3 d-flex justify-content-end">
    <button onclick="openAddStaffModal()" type="button" class="btn btn-primary">
        Add
    </button>
</div>
<table id="staffTable" class="table-secondary">
    <thead>
        <tr>
            <th>ID</th>
            <th>Last Name</th>
            <th>First Name</th>
            <th>Gender</th>
            <th>Date of Birth</th>
            <th>Position</th>
            <th>Action</th>
        </tr>
    </thead>
</table>

<div class="modal fade" id="staffModal" tabindex="-1" aria-labelledby="staffModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="staffModalLabel">Staff Information</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="contactForm">
                    <div class="mb-3 hidden">
                        <input type="text" id="staff_id" class="form-control" placeholder="Staff ID" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="first_nameInput" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="first_nameInput" placeholder="Enter first name" required>
                    </div>
                    <div class="mb-3">
                        <label for="last_nameInput" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="last_nameInput" placeholder="Enter last name" required>
                    </div>
                    <div class="mb-3">
                        <label for="genderInput" class="form-label">Gender</label>
                        <select class="form-select" id="genderInput" style="color: black;" required>
                            <option value="male" selected>Male</option> 
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="date_of_birthInput" class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="date_of_birthInput" placeholder="Enter date of birth" required>
                    </div>
                    <div class="mb-3">
                        <label for="positionInput" class="form-label">Position</label>
                        <select class="form-select" id="positionInput" style="color: black;" required>
                            {% for position in positions %}
                                <option value="{{ position.id }}">{{ position.position_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <button onclick="submitAddEditStaff()" type="button" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
<script>
let table;
$(document).ready(function () {
    table = $('#staffTable').DataTable({
        ajax: {
            url: '/staff/list',
            dataSrc: 'staff'
        },
        columns: [
            { data: 'id' },
            { data: 'first_name' },
            { data: 'last_name' },
            { data: 'gender' },
            { data: 'date_of_birth' },
            { data: 'position__position_name' },
            {
                data: null,
                render: function (data, type, row) {
                    return `
                        <button onclick='openEditStaff(${JSON.stringify(row)})' class="btn btn-primary">Edit</button>
                        <button onclick="deleteStaff(${row.id})" class="btn btn-primary">Delete</button>
                    `;
                }
            }
        ]
    });
});

function openAddStaffModal() {
    $('#staff_id').val('');
    $('#first_nameInput').val('');
    $('#last_nameInput').val('');
    $('#genderInput').val('');
    $('#date_of_birthInput').val('');
    $('#positionInput').val('');
    $('#staffModalLabel').text('Add Position');
    $('#staffModal').modal('show');
}
function submitAddEditStaff() {
    let id = $('#staff_id').val();
    let url = id ? `/staff/edit` : '/staff/add';
    let method = id ? 'PUT' : 'POST';
    
    $.ajax({
        url: url,
        method: method,
        contentType: 'application/json',
        data: JSON.stringify({
            first_name: $('#first_nameInput').val(),
            last_name: $('#last_nameInput').val(),
            gender: $('#genderInput').val(),
            date_of_birth: $('#date_of_birthInput').val(),
            position: $('#positionInput').val(),
            id: id ? parseInt(id) : undefined
        }),
        success: function () {
            $('#staffModal').modal('hide');
            table.ajax.reload();
        }
    });
}

function openEditStaff(data) {
    console.log(data);
    $('#staff_id').val(data.id);
    $('#first_nameInput').val(data.first_name);
    $('#last_nameInput').val(data.last_name);
    $('#genderInput').val(data.gender);
    $('#date_of_birthInput').val(data.date_of_birth);
    $('#positionInput').val(data.position_id);
    $('#staffModal').modal('show');
    $('#staffModalLabel').text('Edit Staff');
}

function deleteStaff(id) {
    $.ajax({
        url: `/staff/delete`,
        method: 'DELETE',
        contentType: 'application/json',
        data: JSON.stringify({
            id: id,
        }),
        success: function () {
            table.ajax.reload();
        }
    });
}
</script>

</body>
</html>

{% endblock %}
