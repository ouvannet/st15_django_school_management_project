{% extends 'base.html' %}

{% block title %}Subject{% endblock %}

{% block content %}

<h2>Subject</h2>

<!DOCTYPE html>
<html>
<head>
    <title>Subject Management</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div class="p-3 d-flex justify-content-end">
    <button onclick="openAddSubjectModal()" type="button" class="btn btn-primary">
        Add
    </button>
</div>
<table id="subjectTable" class="table-secondary">
    <thead>
        <tr>
            <th>ID</th>
            <th>Subject Name</th>
            <th>Action</th>
        </tr>
    </thead>
</table>

<div class="modal fade" id="subjectModal" tabindex="-1" aria-labelledby="subjectModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="subjectModalLabel">Subject Information</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="contactForm">
                    <div class="mb-3 hidden">
                        <input type="text" id="subject_id" class="form-control" placeholder="Subject ID" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="subject_nameInput" class="form-label">Subject Name</label>
                        <input type="text" class="form-control" id="subject_nameInput" placeholder="Enter subject name" required>
                    </div>
                    <button onclick="submitAddEditSubject()" type="button" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
<script>
let table;
$(document).ready(function () {
    table = $('#subjectTable').DataTable({
        serverSide: true,  // Enable server-side processing
        processing: true,  // Show processing indicator
        ajax: {
            url: '/subject/list',
            type: 'GET',
            dataSrc: 'data',  // Match backend's 'data' key
            error: function(xhr, error, thrown) {
                console.error('DataTables AJAX error:', error, thrown);
                console.log('Response:', xhr.responseText);
            }
        },
        columns: [
            { data: 'id' },
            { data: 'subject_name' },
            {
                data: null,
                render: function (data, type, row) {
                    return `
                        <button onclick='openEditSubject(${JSON.stringify(row)})' class="btn btn-primary">Edit</button>
                        <button onclick="deleteSubject(${row.id})" class="btn btn-primary">Delete</button>
                    `;
                }
            }
        ]
    });
});

function openAddSubjectModal() {
    $('#subject_id').val('');
    $('#subject_nameInput').val('');
    $('#subjectModalLabel').text('Add Subject');
    $('#subjectModal').modal('show');
}
function submitAddEditSubject() {
    let id = $('#subject_id').val();
    let url = id ? `/subject/edit` : '/subject/add';
    let method = id ? 'PUT' : 'POST';
    
    $.ajax({
        url: url,
        method: method,
        contentType: 'application/json',
        data: JSON.stringify({
            subject_name: $('#subject_nameInput').val(),
            id: id ? parseInt(id) : undefined
        }),
        success: function () {
            $('#subjectModal').modal('hide');
            table.ajax.reload();
        }
    });
}

function openEditSubject(data) {
    console.log(data);
    $('#subject_id').val(data.id);
    $('#subject_nameInput').val(data.subject_name);
    $('#subjectModal').modal('show');
    $('#subjectModalLabel').text('Edit Subject');
}

function deleteSubject(id) {
    $.ajax({
        url: `/subject/delete`,
        method: 'DELETE',
        contentType: 'application/json',
        data: JSON.stringify({
            id: id,
        }),
        success: function () {
            table.ajax.reload();
        }
    });
}
</script>

</body>
</html>

{% endblock %}
