{% extends 'base.html' %}

{% block title %}Position{% endblock %}

{% block content %}

<h2>Position</h2>

<!DOCTYPE html>
<html>
<head>
    <title>Position Management</title>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>
<body>
<div class="p-3 d-flex justify-content-end">
    <button onclick="openAddPositionModal()" type="button" class="btn btn-primary">
        Add
    </button>
</div>
<table id="positionTable" class="table-secondary">
    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Action</th>
        </tr>
    </thead>
</table>

<div class="modal fade" id="positionModal" tabindex="-1" aria-labelledby="positionModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="positionModalLabel">Position Information</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div id="contactForm">
                    <div class="mb-3 hidden">
                        <input type="text" id="position_id" class="form-control" placeholder="Position ID" readonly>
                    </div>
                    <div class="mb-3">
                        <label for="nameInput" class="form-label">Name</label>
                        <input type="text" class="form-control" id="nameInput" placeholder="Enter position name" required>
                    </div>
                    <button onclick="submitAddEditPosition()" type="button" class="btn btn-primary">Submit</button>
                </div>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
<script>
let table;
$(document).ready(function () {
    table = $('#positionTable').DataTable({
        ajax: {
            url: '/position/list',
            dataSrc: 'positions'
        },
        columns: [
            { data: 'id' },
            { data: 'position_name' },
            {
                data: null,
                render: function (data, type, row) {
                    return `
                        <button onclick='openEditPosition(${JSON.stringify(row)})' class="btn btn-primary">Edit</button>
                        <button onclick="deletePosition(${row.id})" class="btn btn-primary">Delete</button>
                    `;
                }
            }
        ]
    });
});

function openAddPositionModal() {
    $('#position_id').val('');
    $('#nameInput').val('');
    $('#positionModalLabel').text('Add Position');
    $('#positionModal').modal('show');
}
function submitAddEditPosition() {
    let id = $('#position_id').val();
    let url = id ? `/position/edit` : '/position/add';
    let method = id ? 'PUT' : 'POST';
    
    $.ajax({
        url: url,
        method: method,
        contentType: 'application/json',
        data: JSON.stringify({
            name: $('#nameInput').val(),
            id: id ? parseInt(id) : undefined
        }),
        success: function () {
            $('#positionModal').modal('hide');
            table.ajax.reload();
        }
    });
}

function openEditPosition(data) {
    console.log(data);
    $('#position_id').val(data.id);
    $('#nameInput').val(data.position_name);
    $('#positionModal').modal('show');
    $('#positionModalLabel').text('Edit Position');
}

function deletePosition(id) {
    $.ajax({
        url: `/position/delete`,
        method: 'DELETE',
        contentType: 'application/json',
        data: JSON.stringify({
            id: id,
        }),
        success: function () {
            table.ajax.reload();
        }
    });
}
</script>

</body>
</html>

{% endblock %}
